name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching v*, i.e. v1.0.0

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create release
      id-token: write
      attestations: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true

      - name: Build Binaries
        run: |
          make -j $(nproc) all

      - name: Attest Build
        uses: actions/attest@v4
        with:
          subject-path: 'bin/*'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*
          fail_on_unmatched_files: true
          generate_release_notes: true
